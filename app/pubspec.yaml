name: novaforge_starter
description: "Production-ready template for Flutter applications"
publish_to: 'none'
version: 0.0.1

resolution: workspace

#homepage: https://github.com/
#repository: https://github.com/
#issue_tracker: https://github.com/

#funding:
#  - https://www.buymeacoffee.com/
#  - https://www.patreon.com/
#  - https://boosty.to/

#topics:
#  -
#  -

#platforms:
#  android:
#  ios:
#  linux:
#  macos:
#  web:
#  windows:

#screenshots:
#  - description: 'Screenshot 1'
#    path: screenshot_1.png

environment:
  sdk: ^3.8.1
  flutter: ">=3.29.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: any
  async: any
  intl: any

  # Localization
  flutter_localizations:
    sdk: flutter
  localization:
    path: ../packages/localization

  # Database
  database:
    path: ../packages/database

  # UI components
  ui:
    path: ../packages/ui

  # Annotation
  meta: any
  json_annotation: ^4.9.0

  # Routing
  octopus: ^0.0.9

  # State management
  control: ^0.2.0

  # Storing data
  shared_preferences: ^2.5.3

  # Logging
  l: ^5.0.1
  # sentry_flutter: ^8.12.0
  stack_trace: 1.12.1

  # Desktop
  win32: ^5.15.0
  window_manager: ^0.5.1

  # Web
  web: ^1.1.1

  # Utils
  clock: ^1.1.2
  package_info_plus: ^9.0.0
  drift_db_viewer: ^2.1.0
  platform_info: ^5.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.11
  flutter_gen_runner: ^5.13.0
  pubspec_generator: ^5.0.1

  # TODO: Add script for flutter_launcher_icons
  # dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
  flutter_launcher_icons: ^0.14.4

  # TODO: Add script for flutter_native_splash
  # dart run flutter_native_splash:create --path=flutter_native_splash.yaml
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true
